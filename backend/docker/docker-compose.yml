services:
  postgres:
    restart: unless-stopped
    image: postgres:18-alpine
    container_name: postgres_container
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nyarikos
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    restart: unless-stopped
    image: redis:7-alpine
    container_name: redis_container
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  mailpit:
    restart: unless-stopped
    image: axllent/mailpit:v1.29
    container_name: mailpit
    volumes:
      - mailpit_data:/data
    ports:
      - 8025:8025
      - 1025:1025
    environment:
      MP_MAX_MESSAGE: 5000
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  cdn:
    restart: unless-stopped
    image: nginx:alpine
    container_name: cdn_container
    ports:
      - "8001:80"
    depends_on:
      - localstack
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ../uploads:/var/www/uploads

  localstack:
    restart: unless-stopped
    image: localstack/localstack:3.8.1
    container_name: localstack_container
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,sqs
      # - ACTIVATE_PRO=0
      # - DEBUG=1
      - DEFAULT_REGION=ap-southeast-3
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      # - DATA_DIR=/var/lib/localstack/data
    volumes:
      # - localstack-data:/var/lib/localstack
      - "/var/run/docker.sock:/var/run/docker.sock"
      - ./init/aws/init-localstack.sh:/etc/localstack/init/ready.d/init.sh

volumes:
  postgres_data:
  redis_data:
  localstack-data:
  mailpit_data: